<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wallet History</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  padding:20px;
}

.card{
  background:#222;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>📜 APPROVED HISTORY</h2>

<div id="list"></div>

<script>
const API = "https://payfast-backend-475447495901.europe-west1.run.app";

async function load(){
  const res = await fetch(API + "/money/history");
  const data = await res.json();

  list.innerHTML = "";

  data.forEach(r=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${r.name} ${r.surname}</b><br>
      ${r.email}<br>
      REF: ${r.reference}<br><br>

      ${r.item} - ${r.price}<br>

      <small>${new Date(r.timestamp).toLocaleString()}</small>
    `;

    list.appendChild(div);
  });
}

load();
</script>

</body>
</html>
