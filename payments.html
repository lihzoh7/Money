<!DOCTYPE html>
<html>
<head>
<title>Payments</title>
<style>
body{background:#001f3f;color:white;font-family:Arial;}
.card{
  background:#003366;
  padding:10px;
  margin:10px;
  border-radius:8px;
}
button{
  float:right;
  background:green;
  border:none;
  color:white;
  padding:5px;
}
.done{
  background:#222;
}
</style>
</head>

<body>

<h2>Payments</h2>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, set, get, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIza...",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");

onValue(ref(db,"payments/pending"), snap=>{
  list.innerHTML="";
  const data = snap.val();
  if(!data) return;

  Object.entries(data).forEach(([id,p])=>{

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      ${p.name} ${p.surname}<br>
      ${p.email}<br>
      ${p.product}<br>
      R${p.amount}
      <button onclick="approve('${id}')">APPROVE</button>
    `;

    list.appendChild(div);
  });
});

window.approve = async (id)=>{

  const snap = await get(ref(db,`payments/pending/${id}`));
  const p = snap.val();

  const ecoRef = ref(db,`users/${p.uid}/economy`);

  if(p.product.includes("300")){
    await update(ecoRef,{ gems: (p.gems || 0) + 300 });
  }
  if(p.product.includes("900")){
    await update(ecoRef,{ gems: (p.gems || 0) + 900 });
  }
  if(p.product.includes("2♥")){
    await update(ecoRef,{
      lives:(p.lives||0)+2,
      gems:(p.gems||0)+500
    });
  }

  await set(ref(db,`payments/history/${id}`),{
    ...p,
    status:"completed",
    time:Date.now()
  });

  await remove(ref(db,`payments/pending/${id}`));
};

</script>

</body>
  </html>
