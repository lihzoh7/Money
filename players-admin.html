<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Players Admin</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
}

.card{
  padding:15px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  authDomain: "tose-ccf8f.firebaseapp.com",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tose-ccf8f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"users"), snap=>{
  const data=snap.val()||{};
  const list=document.getElementById("list");
  list.innerHTML="";

  for(let uid in data){
    let u=data[uid];

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      ${u.name || ""} ${u.surname || ""}<br>
      ${u.email || ""}<br>
      ${u.cellNumber || ""}
    `;

    list.appendChild(div);
  }
});
</script>

</body>
</html>
