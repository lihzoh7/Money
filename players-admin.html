<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Players Admin</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
}

.card{
  padding:15px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  authDomain: "tose-ccf8f.firebaseapp.com",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tose-ccf8f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "admin.html";
    return;
  }

  const snap = await get(ref(db, "admins/" + user.uid));

  if (!snap.exists()) {
    alert("Not admin ❌");
    location.href = "admin.html";
  }
});

onValue(ref(db,"users"), snap=>{
  const data=snap.val()||{};
  list.innerHTML="";

  Object.values(data).forEach(u=>{
    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      ${u.name||""} ${u.surname||""}<br>
      ${u.email||""}<br>
      ${u.cellNumber||""}
    `;
    list.appendChild(div);
  });
});
    </script>

</body>
</html>
