<!DOCTYPE html>
<html>
<head>
<title>MONEY ADMIN</title>
<style>
body{
  margin:0;
  background:#001f3f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
.tile{
  width:160px;
  height:140px;
  background:#0074D9;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="grid">
  <div class="tile" onclick="go('payments.html')">PAYMENTS</div>
  <div class="tile" onclick="go('life-buyer.html')">LIFE BUYER</div>
  <div class="tile" onclick="go('withdrawals.html')">WITHDRAWALS</div>
</div>

<script>
function go(p){
  window.location.href = p;
}
</script>

</body>
