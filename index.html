<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

/* NAVY 2:3 BOX */
#panel{
  width:90%;
  height:90%;
  background:#001f3f;
  display:grid;
  grid-template-rows:repeat(8,1fr);
  gap:5px;
  padding:10px;
  box-sizing:border-box;
}

/* TILE */
.tile{
  background:#003366;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
  cursor:pointer;
  border-radius:8px;
}

/* PLUS */
.plus{
  text-align:center;
  font-size:22px;
  color:white;
}
</style>
</head>

<body>

<div id="panel">

  <div class="tile" onclick="go('admin-prizes.html')">PRIZES</div>

  <div class="tile" onclick="go('pop-up-admin.html')">POP UP</div>
  <div class="plus">➕</div>
  <div class="tile" onclick="go('pop-history.html')">POP HISTORY</div>

  <div class="tile" onclick="go('wallet-admin.html')">WALLET</div>
  <div class="plus">➕</div>
  <div class="tile" onclick="go('wallet-history.html')">WALLET HISTORY</div>

  <div class="tile" onclick="go('leaderboard-admin.html')">LEADERBOARD</div>

  <div class="tile" onclick="go('players-admin.html')">PLAYERS</div>

  <div class="tile" onclick="go('envelope-admin.html')">✉ ENVELOPE</div>

</div>

<script>
function go(page){
  location.href = page;
}
</script>

</body>
    </html>
