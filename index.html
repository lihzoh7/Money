<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN</title>

<style>
body{
  margin:0;
  background:black;
  font-family:Arial;
}

/* LOGIN POPUP */
#loginBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:30px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.8);
}

#loginBox input{
  display:block;
  width:200px;
  margin:10px auto;
  padding:10px;
  border:none;
  border-radius:5px;
}

#loginBox button{
  padding:10px 20px;
  background:#003366;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* PANEL (HIDDEN UNTIL LOGIN) */
#panel{
  display:none;
  width:90%;
  height:90vh;
  margin:auto;
  margin-top:5vh;
  background:#001f3f;
  display:grid;
  grid-template-rows:repeat(8,1fr);
  gap:5px;
  padding:10px;
  box-sizing:border-box;
}

/* TILE */
.tile{
  background:#003366;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
  cursor:pointer;
  border-radius:8px;
}

.plus{
  text-align:center;
  font-size:22px;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN POPUP -->
<div id="loginBox">
  <h3>Admin Login</h3>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">LOGIN</button>
</div>

<!-- ADMIN PANEL -->
<div id="panel">

  <div class="tile" onclick="go('admin-prizes.html')">PRIZES</div>

  <div class="tile" onclick="go('pop-up-admin.html')">POP UP</div>
  <div class="plus">➕</div>
  <div class="tile" onclick="go('pop-history.html')">POP HISTORY</div>

  <div class="tile" onclick="go('wallet-admin.html')">WALLET</div>
  <div class="plus">➕</div>
  <div class="tile" onclick="go('wallet-history.html')">WALLET HISTORY</div>

  <div class="tile" onclick="go('leaderboard-admin.html')">LEADERBOARD</div>

  <div class="tile" onclick="go('players-admin.html')">PLAYERS</div>

  <div class="tile" onclick="go('envelope-admin.html')">✉ ENVELOPE</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  authDomain: "tose-ccf8f.firebaseapp.com",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tose-ccf8f"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.login = async function(){
  const email = email.value;
  const pass = pass.value;

  try{
    const userCred = await signInWithEmailAndPassword(auth, email, pass);
    const uid = userCred.user.uid;

    const snap = await get(ref(db, "admins/" + uid));

    if(snap.exists()){
      showPanel();
    } else {
      alert("Not admin ❌");
      auth.signOut();
    }
  }catch(e){
    alert("Login failed ❌");
  }
};

onAuthStateChanged(auth, async (user)=>{
  if(user){
    const snap = await get(ref(db, "admins/" + user.uid));
    if(snap.exists()) showPanel();
  }
});

function showPanel(){
  loginBox.style.display="none";
  panel.style.display="grid";
}

window.go = (p)=>location.href=p;
  </script>

</body>
  </html>
