<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wallet Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}
.card{
  background:#1e1e1e;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
.approve{
  margin-top:10px;
  padding:10px;
  background:green;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
}
.empty{
  text-align:center;
  margin-top:50px;
  color:#777;
}
</style>
</head>

<body>

<h2>💳 WALLET APPROVALS</h2>
<div id="list">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  authDomain: "tose-ccf8f.firebaseapp.com",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tose-ccf8f"
});

const db = getDatabase(app);
const auth = getAuth(app);
const list = document.getElementById("list");

/* AUTH FIRST */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    list.innerHTML = "Not logged in ❌";
    setTimeout(()=> location.href="admin.html",1000);
    return;
  }

  const snap = await get(ref(db, "admins/" + user.uid));

  if (!snap.exists()) {
    list.innerHTML = "Not admin ❌";
    setTimeout(()=> location.href="admin.html",1000);
    return;
  }

  loadRequests(); // ✅ only after auth
});

/* LOAD */
function loadRequests(){
  onValue(ref(db,"walletRequests"), snap=>{
    const data = snap.val() || {};
    list.innerHTML = "";

    const keys = Object.keys(data).reverse();

    if(keys.length === 0){
      list.innerHTML = `<div class="empty">No requests</div>`;
      return;
    }

    keys.forEach(id=>{
      const r = data[id];
      if(r.status === "approved") return;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${r.name || ""} ${r.surname || ""}</b><br>
        ${r.email || ""}<br><br>

        🧾 ${r.item} - ${r.price}<br>
        💎 ${r.gems || 0} | ❤️ ${r.lives || 0}<br>

        <small>${new Date(r.timestamp).toLocaleString()}</small>

        <div class="approve" onclick="approve('${id}','${r.uid}',${r.gems || 0},${r.lives || 0})">
          APPROVE
        </div>
      `;

      list.appendChild(div);
    });
  });
}

/* APPROVE */
window.approve = async function(id, uid, rGems, rLives){

  const walletRef = ref(db,"wallet/"+uid);

  const snap = await get(walletRef);
  let wallet = snap.val() || {gems:0,lives:0};

  wallet.gems += Number(rGems || 0);
  wallet.lives += Number(rLives || 0);

  await update(walletRef, wallet);

  await update(ref(db,"walletRequests/"+id),{
    status:"approved"
  });

  alert("Approved ✅");
};
</script>

</body>
</html>
