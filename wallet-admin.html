<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wallet Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}

.card{
  background:#1e1e1e;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

.approve{
  margin-top:10px;
  padding:10px;
  background:green;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>💳 WALLET APPROVALS</h2>

<div id="list"></div>

<script>
const API = "https://payfast-backend-475447495901.europe-west1.run.app";

async function load(){
  const res = await fetch(API + "/money/requests");
  const data = await res.json();

  list.innerHTML = "";

  data.forEach(r=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${r.name} ${r.surname}</b><br>
      ${r.number}<br>
      ${r.email}<br>
      REF: ${r.reference}<br><br>

      BUYING: ${r.item}<br>
      PRICE: ${r.price}<br>

      <small>${new Date(r.timestamp).toLocaleString()}</small>

      <div class="approve" onclick="approve('${r.id}')">
        APPROVE
      </div>
    `;

    list.appendChild(div);
  });
}

async function approve(id){
  await fetch(API + "/money/approve",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id})
  });

  load();
}

load();
</script>

</body>
</html>
