<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wallet Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}

.card{
  background:#1e1e1e;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

.approve{
  margin-top:10px;
  padding:10px;
  background:green;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>💳 WALLET APPROVALS</h2>

<div id="list"></div>

<script>

/* LOAD REQUESTS */
function load(){

  const data = JSON.parse(localStorage.getItem("walletRequests") || "[]");

  const list = document.getElementById("list");
  list.innerHTML = "";

  if(data.length === 0){
    list.innerHTML = "<p>No requests</p>";
    return;
  }

  data.forEach(r=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${r.name} ${r.surname}</b><br>
      ${r.number}<br>
      ${r.email}<br>
      REF: ${r.reference}<br><br>

      BUYING: ${r.item}<br>
      PRICE: ${r.price}<br>

      <small>${new Date(r.timestamp).toLocaleString()}</small>

      <div class="approve" onclick="approve(${r.id})">
        APPROVE
      </div>
    `;

    list.appendChild(div);
  });
  }
  
/* APPROVE */
function approve(id){

  let requests = JSON.parse(localStorage.getItem("walletRequests") || "[]");
  let history = JSON.parse(localStorage.getItem("walletHistory") || "[]");

  const item = requests.find(r=>r.id === id);

  if(!item) return;

  /* REWARD PLAYER */
  let wallet = JSON.parse(localStorage.getItem("wallet_"+item.uid) || "{}");

  if(item.item.includes("300 gems")){
    wallet.gems = (wallet.gems || 0) + 300;
  }

  if(item.item.includes("900 gems")){
    wallet.gems = (wallet.gems || 0) + 900;
  }

  if(item.item.includes("500 gems")){
    wallet.gems = (wallet.gems || 0) + 500;
    wallet.lives = (wallet.lives || 0) + 2;
  }

  localStorage.setItem("wallet_"+item.uid, JSON.stringify(wallet));

  /* MOVE TO HISTORY */
  requests = requests.filter(r=>r.id !== id);
  history.push(item);

  localStorage.setItem("walletRequests", JSON.stringify(requests));
  localStorage.setItem("walletHistory", JSON.stringify(history));

  alert("Approved & Rewarded ✅");

  load();
}

load();

</script>

</body>
</html>
