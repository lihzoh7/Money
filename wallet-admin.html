<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wallet Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}
.card{
  background:#1e1e1e;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
.approve{
  margin-top:10px;
  padding:10px;
  background:green;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>💳 WALLET APPROVALS</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  authDomain: "tose-ccf8f.firebaseapp.com",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tose-ccf8f",
  storageBucket: "tose-ccf8f.appspot.com",
  messagingSenderId: "475447495901",
  appId: "1:475447495901:web:9189276a162a3680afdf34"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");

/* LOAD REQUESTS */
onValue(ref(db,"walletRequests"), snap=>{
  const data = snap.val() || {};
  list.innerHTML="";

  Object.keys(data).forEach(id=>{
    const r = data[id];

    if(r.status === "approved") return;

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${r.name} ${r.surname}</b><br>
      ${r.email}<br>
      ${r.item} - ${r.price}<br>
      <small>${new Date(r.timestamp).toLocaleString()}</small>

      <div class="approve" onclick="approve('${id}','${r.uid}','${r.gems}','${r.lives}')">
        APPROVE
      </div>
    `;

    list.appendChild(div);
  });
});

/* APPROVE */
window.approve = async function(id, uid, rGems, rLives){

  const walletRef = ref(db,"wallet/"+uid);

  const snap = await get(walletRef);
  let wallet = snap.val() || {gems:0,lives:0};

  // ✅ SAFE ADD
  wallet.gems = (wallet.gems || 0) + (rGems || 0);
  wallet.lives = (wallet.lives || 0) + (rLives || 0);

  await update(walletRef, wallet);

  await update(ref(db,"walletRequests/"+id),{
    status:"approved"
  });

  alert("Approved ✅");
      }
</script>

</body>
</html>
