<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prize Admin</title>

<style>
body{background:navy;color:white;font-family:Arial;}
.cell{
  border:1px solid white;
  padding:10px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2 id="week"></h2>
<div id="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const auth = getAuth();

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "admin.html";
    return;
  }

  const snap = await get(ref(db, "admins/" + user.uid));

  if (!snap.exists()) {
    location.href = "admin.html";
  }
});
const app = initializeApp({
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app"
});

const db=getDatabase(app);

const days=7;
const rows=2;

function getWeek(){
  let now=new Date();
  let start=new Date(now.setDate(now.getDate()-((now.getDay()+6)%7)));
  let end=new Date(start);
  end.setDate(start.getDate()+6);

  return {
    from:start.toDateString(),
    to:end.toDateString()
  };
}

function render(data){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  for(let d=0;d<days;d++){
    for(let r=0;r<rows;r++){
      let val=data?.schedule?.[d]?.[r]?.value || 0;

      let div=document.createElement("div");
      div.className="cell";
      div.innerText=`Day ${d} Slot ${r}: ${val}`;

      div.onclick=()=>{
        let v=prompt("Enter amount:",val);
        if(v!==null){
          set(ref(db,`admin/prizes/schedule/${d}/${r}`),{
            value:parseInt(v)
          });
        }
      };

      grid.appendChild(div);
    }
  }
}

onValue(ref(db,"admin/prizes"),snap=>{
  let data=snap.val()||{};

  let week=getWeek();

  document.getElementById("week").innerText =
    week.from+" - "+week.to;

  render(data);
});
</script>

</body>
</html>
