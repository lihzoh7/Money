<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Leaderboard</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

#list{
  padding:10px;
}

.card{
  padding:12px;
  border-bottom:1px solid #333;
}

.line{
  border-top:3px solid red;
  margin:20px 0;
}

#resetBtn{
  position:fixed;
  bottom:10px;
  right:10px;
  color:red;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="list"></div>
<div id="resetBtn">RESET / BREAK</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = getDatabase(app);

const list = document.getElementById("list");

/* SHOW CURRENT TOP 6 */
onValue(ref(db,"leaderboard/current"), snap=>{
  const data=snap.val()||{};
  let arr=[];

  for(let uid in data){
    arr.push(data[uid]);
  }

  arr.sort((a,b)=>b.score-a.score);

  list.innerHTML="";

  arr.slice(0,6).forEach(p=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${p.name}</b><br>
      SCORE: ${p.score}
    `;

    list.appendChild(div);
  });
});

/* RESET BUTTON */
document.getElementById("resetBtn").onclick = async ()=>{

  const snap = await get(ref(db,"leaderboard/current"));
  const data = snap.val();

  if(data){
    // SAVE SNAPSHOT
    await set(ref(db,"leaderboard/adminHistory/"+Date.now()), data);
  }

  // CLEAR PLAYER BOARD
  await set(ref(db,"leaderboard/current"), null);

  // DRAW LINE
  let line=document.createElement("div");
  line.className="line";
  list.appendChild(line);
};
</script>

</body>
</html>
