<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard Admin</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
}

.section{
  border-bottom:3px solid white;
  margin-bottom:20px;
  padding-bottom:10px;
}

.card{
  padding:10px;
  border-bottom:1px solid #444;
}
</style>
</head>

<body>

<h2>ADMIN LEADERBOARD</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = getDatabase(app);

const list = document.getElementById("list");

/* LOAD HISTORY */
onValue(ref(db,"leaderboard/history"), snap=>{
  const data = snap.val() || {};

  list.innerHTML="";

  const rounds = Object.entries(data).sort((a,b)=>b[0]-a[0]);

  rounds.forEach(([time,players])=>{

    let section = document.createElement("div");
    section.className="section";

    let arr = [];

    for(let uid in players){
      arr.push(players[uid]);
    }

    arr.sort((a,b)=>b.score-a.score);

    arr.slice(0,6).forEach(p=>{
      let div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <b>${p.name}</b><br>
        Score: ${p.score}<br>
        ${new Date(p.timestamp).toLocaleString()}
      `;

      section.appendChild(div);
    });

    list.appendChild(section);
  });
});
</script>

</body>
</html>
