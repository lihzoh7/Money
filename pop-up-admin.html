<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pop Up Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}
.card{
  background:#1e1e1e;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
.approve{
  margin-top:10px;
  padding:10px;
  background:green;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
}
.empty{
  text-align:center;
  margin-top:50px;
  color:#777;
}
</style>
</head>

<body>

<h2>📋 POP UP APPLICATIONS</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, set, update, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

/* ✅ INIT FIRST */
const firebaseConfig = {
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  authDomain: "tose-ccf8f.firebaseapp.com",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tose-ccf8f",
  storageBucket: "tose-ccf8f.appspot.com",
  messagingSenderId: "475447495901",
  appId: "1:475447495901:web:9189276a162a3680afdf34"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const list = document.getElementById("list");

/* 🔐 AUTH CHECK */


/* 📥 LOAD APPLICATIONS */
onValue(ref(db,"applications"), snap=>{
  const data = snap.val() || {};
  list.innerHTML="";

  const keys = Object.keys(data).reverse(); // newest first

  if(keys.length === 0){
    list.innerHTML = `<div class="empty">No applications</div>`;
    return;
  }

  keys.forEach(uid=>{
    const r = data[uid];

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${r.name || ""} ${r.surname || ""}</b><br>
      📞 ${r.number || ""}<br>
      🎂 ${r.age || ""}<br>
      🔗 ${r.referral || "None"}<br>
      <small>${new Date(r.timestamp).toLocaleString()}</small>

      <div class="approve" onclick="approve('${uid}')">
        GRANT ✅
      </div>
    `;

    list.appendChild(div);
  });
});

/* ✅ APPROVE */
window.approve = async function(uid){

  try{
    const now = Date.now();

    const snap = await get(ref(db,"applications/"+uid));
    const data = snap.val();

    if(!data){
      alert("Application not found ❌");
      return;
    }

    // MOVE TO HISTORY
    await set(ref(db,"applicationsHistory/"+uid),{
      ...data,
      approvedAt: now
    });

    // APPROVE USER
    await update(ref(db,"users/"+uid),{
      approved:true
    });

    // REMOVE FROM PENDING
    await remove(ref(db,"applications/"+uid));

    alert("User Approved ✅");

  }catch(e){
    console.error(e);
    alert("Error ❌");
  }
};
</script>

</body>
</html>
