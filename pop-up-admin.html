<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pop Up Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}
.card{
  background:#1e1e1e;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
.approve{
  margin-top:10px;
  padding:10px;
  background:green;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>📋 POP UP APPLICATIONS</h2>
<div id="list"></div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, set, update, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  authDomain: "tose-ccf8f.firebaseapp.com",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tose-ccf8f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="admin.html";

  const snap = await get(ref(db,"admins/"+user.uid));
  if(!snap.exists()) location.href="admin.html";
});

onValue(ref(db,"applications"), snap=>{
  const data=snap.val()||{};
  list.innerHTML="";

  Object.entries(data).forEach(([uid,r])=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${r.name} ${r.surname}</b><br>
      ${r.number}<br>
      ${r.age}<br>
      ${r.referral||"None"}<br>
      <small>${new Date(r.timestamp).toLocaleString()}</small>
      <div class="approve" onclick="approve('${uid}')">GRANT ✅</div>
    `;

    list.appendChild(div);
  });
});

window.approve = async(uid)=>{
  const snap = await get(ref(db,"applications/"+uid));
  const data = snap.val();

  if(!data) return;

  await set(ref(db,"applicationsHistory/"+uid),{
    ...data,
    approvedAt:Date.now()
  });

  await update(ref(db,"users/"+uid),{ approved:true });

  await remove(ref(db,"applications/"+uid));

  alert("Approved ✅");
};
  </script>
</body>
</html>
