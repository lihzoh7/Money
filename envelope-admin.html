<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Envelope Admin</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

#timer{
  font-size:40px;
  margin:10px;
}

#list{
  padding:10px;
}

.card{
  border-bottom:2px solid #444;
  padding:15px;
  text-align:left;
}
</style>
</head>

<body>

<div id="timer">--:--</div>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  authDomain: "tose-ccf8f.firebaseapp.com",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tose-ccf8f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="admin.html";

  const snap = await get(ref(db,"admins/"+user.uid));
  if(!snap.exists()) location.href="admin.html";
});

onValue(ref(db,"leaderboard/current"), async snap=>{
  const data=snap.val()||{};
  let arr=Object.entries(data).map(([uid,v])=>({uid,...v}));

  arr.sort((a,b)=>b.score-a.score);

  const usersSnap = await get(ref(db,"users"));
  const walletsSnap = await get(ref(db,"walletDetails"));

  const users = usersSnap.val()||{};
  const wallets = walletsSnap.val()||{};

  list.innerHTML="";

  arr.slice(0,6).forEach(p=>{
    const user = users[p.uid]||{};
    const wallet = wallets[p.uid]||{};

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${user.name||""} ${user.surname||""}</b><br>
      ${user.cellNumber||""}<br><br>
      BANK: ${wallet.bank||"-"}<br>
      ACC: ${wallet.account||"-"}<br>
      BRANCH: ${wallet.branch||"-"}<br><br>
      SCORE: ${p.score}
    `;

    list.appendChild(div);
  });
});
  </script>
</body>
</html>
