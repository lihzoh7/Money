<!DOCTYPE html>
<html>
<head>
<title>Withdrawals</title>
<style>
body{background:#001f3f;color:white;font-family:Arial;}
.card{background:#003366;margin:10px;padding:10px;border-radius:8px;}
button{background:green;color:white;border:none;padding:5px;}
</style>
</head>

<body>

<h2>Withdrawals</h2>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, set, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIza...",
  databaseURL:"https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = getDatabase(app);
const list = document.getElementById("list");

onValue(ref(db,"withdrawals/pending"), snap=>{
  list.innerHTML="";
  const data = snap.val();
  if(!data) return;

  Object.entries(data).forEach(([id,w])=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      ${w.name}<br>
      Bank: ${w.bank}<br>
      Acc: ${w.account}<br>
      Amount: R${w.amount}
      <button onclick="approve('${id}')">APPROVE</button>
    `;

    list.appendChild(div);
  });
});

window.approve = async(id)=>{
  const snap = await get(ref(db,`withdrawals/pending/${id}`));
  const w = snap.val();

  await set(ref(db,`withdrawals/history/${id}`),{
    ...w,
    status:"completed",
    time:Date.now()
  });

  await remove(ref(db,`withdrawals/pending/${id}`));
};

</script>

</body>
</html>
