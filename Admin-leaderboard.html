<!DOCTYPE html>
<html>
<head>
<title>Admin Leaderboard</title>
<style>
body{background:black;color:white;font-family:Arial;}
.player{border-bottom:1px solid #444;padding:10px;}
</style>
</head>

<body>

<h2>Players</h2>
<button onclick="download()">DOWNLOAD DOC</button>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const app = initializeApp({ databaseURL:"https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app" });
const db = getDatabase(app);

let players=[];

onValue(ref(db,"leaderboard/current"), snap=>{
  const data = snap.val()||{};
  players=[];

  let html="";

  Object.keys(data).slice(0,400).forEach((uid,i)=>{
    let p=data[uid];

    players.push(p);

    html+=`
      <div class="player">
        ${i+1}. ${p.name || ""}<br>
        ${p.email || ""}<br>
        ${p.phone || ""}<br>
        SCORE: ${p.score}
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
});

window.download=function(){
  let text = players.map(p=>`${p.name} ${p.score}`).join("\n");

  let blob = new Blob([text]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "players.doc";
  a.click();
}
</script>
</body>
</html>
